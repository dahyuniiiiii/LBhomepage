<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>리뷰's</title>
    <link rel="stylesheet" href="review.css" />
</head>
<body>
    <nav>
        <div class="nav_logo">
        <img src="./image/logo.png" />
        </div>
        <div class="nav_menu">
        <a href="studyroon.html">StudyRoom</a>
        <a href="attendance.html">Attendance</a>
        <a href="login.html"><button class="nav_btn">로그인</button></a>
        </div>
    </nav>

    <div class="Review-container">
        <h2>Reviews</h2>
        <div style="margin-bottom: 40px;"></div> <!-- 간격 추가 -->
        <div id="reviewList" class="review-list"></div>
        <button class="review-btn" onclick="openForm()">리뷰 작성하기</button>
    </div>

    <div class="review-form" id="reviewForm">
        <div class="form-content"> 
        <div class="form-header">
            <h3>스터디 리뷰 작성</h3>
            <span class="close-btn" onclick="closeForm()">×</span>
        </div>
        <hr class="form-divider" />

        <label for="studyType">스터디 유형</label>
        <select id="studyType">
            <option value=""disabled selected>스터디 유형</option>
            <option value="코딩테스트 스터디">코딩테스트 스터디</option>
            <option value="기술블로그 스터디">기술블로그 스터디</option>
            <option value="포토폴리오 제작 스터디">포토폴리오 제작 스터디</option>
            <option value="HTML 미니해커톤">HTML 미니해커톤</option>
            <option value="5월 js 미니해커톤">5월 js 미니해커톤</option>
            <option value="js프로젝트 스터디">js프로젝트 스터디</option>
        </select>

        <label for="reviewText">후기작성</label>
        <textarea id="reviewText" rows="5" maxlength="250" placeholder="상세한 후기를 작성해주세요."></textarea>
        <div class="char-counter" id="charCounter">0 / 250자</div>

        <button class="submit-btn">리뷰 등록</button>
        </div>
    </div>

    <footer>
        <div class="footer">
        <div class="footer_top">
            <strong style="font-size: 30px;">BU LIKELION</strong>
            <a href="https://www.instagram.com/">
            <img src="./image/footer_lnstagram_logo.png" alt="인스타그램" />
            </a>
            <a href="https://www.likelion.net/">
            <img src="./image/footer_likelion_logo.png" alt="멋쟁이사자처럼" />
            </a>
        </div>
        <a class="footer_bottom">
            @ 2025 BU LIKELION STUDY. All rights reserved.
        </a>
        </div>
    </footer>

</body>
<script src="review.js"></script>
</html>
